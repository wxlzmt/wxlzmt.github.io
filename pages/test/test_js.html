<script type="text/javascript">

	var foramtTime = function(d,s1,s2){
		if(s1==null){
			s1 = "-";
		}
		if(s2==null){
			s2 = ":";
		}
		var yyyy = d.getFullYear();
		var mo = d.getMonth()<9?("0"+eval(d.getMonth()+1)):d.getMonth();
		var dd = d.getDate()<10?("0"+d.getDate()):d.getDate();
		var hh = d.getHours()<10?("0"+d.getHours()):d.getHours();
		var mi = d.getMinutes()<10?("0"+d.getMinutes()):d.getMinutes();
		var ss = d.getSeconds()<10?("0"+d.getSeconds()):d.getSeconds();
		return yyyy+s1+mo+s1+dd+" "+hh+s2+mi+s2+ss;
	}

	var patt = new RegExp("console\\.log","g");
	function clickBt2(){
		function str_console_log_print(str){
				console.log(str);//控制台输出
				var original = $("#idDivPrint").html();
				var newHtml = original+"<br/>"+str;
				$("#idDivPrint").html(newHtml);//页面输出(append方式)
			}
			var val = $("#idTextAreaInput1").val();
			if(val!=null && ""!=val){
				val = (new String(val)).replace(patt,"str_console_log_print");
				//console.log(val);
				eval(val);//运算
			}
		}
		function createHTMLNode(){
			$("#idDivCanvasInputHtmlTag").html("");
			$("#idDivCanvasInputHtmlTag").html($("#idTextAreaInput2").val());
		}
		function clearBt(){
			$("#idDivPrint").html("");
		}
	</script>
	<title>html js 测试工具</title>
