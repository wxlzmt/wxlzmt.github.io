<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>测试曲线展示</title>
<style>
    html{
        width:100%;
        height: 100%;
        min-width: 400px;
        min-height: 250px;
    }
    body{
        width:100%;
        height: 100%;
        margin:0px 0px 0px 0px ;
    }
    /*必要*/
    .i-layout-div{
        box-sizing: border-box;
        -moz-box-sizing: border-box;
        -webkit-box-sizing:border-box;
        overflow: auto;
    }
    .div_tb{
        display: table;
        width: 100%;
        height: 100%;
        margin:0px;
    }
    .div_tb_row{
        display: table-row;
    }
    .div_tb_cell{
        display: table-cell;
        height: 100%;
        vertical-align: middle;
    }

    .div_container{
        width:100%;
        height:100%;
        border:1px solid green;
    }
    .span_info{
        color:green;
    }
    .error{
        background: rgba(255,0,0,0.85);
    }
</style>
<script src="../../js/echarts-all-resource.js"></script>

<script type="text/javascript">

var _g_data = [];

function getXDataArr(){
    var yData = [];
    for(var i=0;i<_g_data.length;i++){
       yData.push(i);
    };
    return yData;
}

function getYDataArr(){
    return _g_data;
}

function getOption(){
    var option0_0 = {
        color: ['#3398DB'],
        tooltip : {
            trigger: 'axis'
        },
        toolbox: {
            feature: {
                dataZoom: {
                    yAxisIndex: 'none'
                },
                restore: {},
                saveAsImage: {}
            }
        },
        dataZoom: [
            {
                type: 'slider',
                show: true,
                xAxisIndex: [0]
            },
            {
                type: 'slider',
                show: true,
                yAxisIndex: [0]
            },
            {
                type: 'inside',
                xAxisIndex: [0]
            },
            {
                type: 'inside',
                yAxisIndex: [0]
            }
        ],
        xAxis : [
            {
                type : 'category',
                data : getXDataArr()
            }
        ],
        yAxis : [
            {
                type : 'value',
                min:0
            }
        ],
        series : [
            {
                name:'曲线',
                type:'line',
                data:getYDataArr()
            }
        ]
    };
    return option0_0;
}


/**
 * 用百度的Echarts做图,需要引入3.0以上版本的js包;
 * 参数1:要做图的容器的ID;
 * 参数2:option;
 * @param {Object} containerId 要做图的容器的ID;
 * @param {Object} option option对象
 */
function drawEchart(containerId,option){
    if(typeof(containerId)=="string" && typeof(option)=="object" && containerId!=null && containerId!=""){
        try{
            var myChart = echarts.init(document.getElementById(containerId));
            // 为echarts对象加载数据 
            myChart.setOption(option);
            return myChart;
        }catch(e){
            console.log(e);
        }
    }
}

var echartInstances = [];

//绘图
function readyDraw(){
    var myChart0_0 = drawEchart('container0_0',getOption());
    if(myChart0_0){
        echartInstances.push(myChart0_0);
    }
}

function reloadData(){
    var data = validateData();
    if(data!=false){
        _g_data = data;
        destory();
        readyDraw();
    }else{
        alert("数据错误!");
    }
}

//如果数据格式不对,则返回false,否则返回数据对象;
function validateData(){
    try{
        var d = document.getElementById("idarea").value;
        var cc = eval(d);
        if(cc instanceof Array){
            return cc;
        }
    }catch(e){
        console.log(e);
    }
    return false;
}

function destory(){
    for(var i=0 ; i<echartInstances.length;i++){
        var ins = echartInstances[i];
        if(ins!=null && !ins.isDisposed()){
            ins.dispose();
            echartInstances[i]=null;
        }
    }
    echartInstances=[];
}

window.addEventListener("resize", function () {
    for(var i=0 ; i<echartInstances.length;i++){
        var ins = echartInstances[i];
        ins.resize();
    }
});

</script>

</head>
<body onload="reloadData()" >
    <div class="i-layout-div" style="position: relative;width:100%;height: 100%;padding: 40px 0px 0px 0px;">
        <div class="i-layout-div" style="position: absolute;top: 0px;left: 0px;height: 40px;width: 100%;">
            <div class="div_tb">
                <div class="div_tb_row">
                    <div class="i-layout-div div_tb_cell">
                        <textarea id="idarea" class="i-layout-div" style="width: 100%;resize:none;" placeholder="曲线数据数组">[3,2,2,44,453,23,23,34,545,565,76,87,8,76,45,43,45,34,56,7,687,87,98,67,67,56,45,435,23,445,45,65]</textarea>
                    </div>
                    <div class="i-layout-div div_tb_cell" align="center" style="width: 120px;padding-right: 20px;">
                        <button onclick="reloadData();" style="float: right;">刷新曲线图</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="i-layout-div" style="position: relative;width: 100%;height: 100%;padding:0px 5px 5px 5px;">
            <div id="container0_0" class="i-layout-div div_container"></div>
        </div>
    </div>
</body>
</html>
