<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-transform,no-cache"/>
    <meta name="description" content="test tube three.js">
    <meta name="keywords" content="test tube three.js">
    <meta name="author" content="zdd">
    <title>test tube three.js</title>
    <style type="text/css">
        html, body {
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            margin: 0px;
            padding: 0px;
        }

        .i-layout-box, body {
            box-sizing: border-box;
            -moz-box-sizing: border-box;
            -webkit-box-sizing: border-box;
            overflow: auto;
        }
    </style>
    <script src="../../plugins/three.js/r108/three.js" type="text/javascript"></script>
</head>
<!-- 使用 font-size: 0px; 是为了避免空白符导致的滚动条 -->
<body style="font-size: 0px;">
<script>
  //创建场景
  var scene = new THREE.Scene();
  //创建透视相机
  var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  //创建渲染器
  var renderer = new THREE.WebGLRenderer();
  //画布尺寸
  renderer.setSize(window.innerWidth, window.innerHeight);
  //设置画布背景色
  renderer.setClearColor('rgba(255,255,255,0)', 1.0);
  //插入到dom里
  document.body.appendChild(renderer.domElement);
  //画一个边长为1的立方体
  var geometry = new THREE.CubeGeometry(1, 1, 1);
  var material = new THREE.MeshBasicMaterial({color: 0x00ff00});
  var cube = new THREE.Mesh(geometry, material);
  scene.add(cube);
  camera.position.z = 5;

  function render() {
    //requestAnimationFrame是原生js方法，用于更新渲染
    requestAnimationFrame(render);
    cube.rotation.x += 0.1;
    cube.rotation.y += 0.1;
    renderer.render(scene, camera);
  }

  //执行渲染
  render();
</script>
</body>
</html>
